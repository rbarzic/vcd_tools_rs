name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use_cross: false
            archive_ext: tar.gz

          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
            archive_ext: tar.gz

          # Windows x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false
            archive_ext: zip

          # macOS Intel
          - os: macos-13
            target: x86_64-apple-darwin
            use_cross: false
            archive_ext: tar.gz

          # macOS ARM64
          - os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
            archive_ext: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: |
          strip target/${{ matrix.target }}/release/vcd_tools_rs || true
          strip target/${{ matrix.target }}/release/vcd2trace || true
        shell: bash

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p vcd_tools_rs-${{ github.ref_name }}-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/vcd_tools_rs vcd_tools_rs-${{ github.ref_name }}-${{ matrix.target }}/
          cp target/${{ matrix.target }}/release/vcd2trace vcd_tools_rs-${{ github.ref_name }}-${{ matrix.target }}/
          tar czf vcd_tools_rs-${{ github.ref_name }}-${{ matrix.target }}.tar.gz vcd_tools_rs-${{ github.ref_name }}-${{ matrix.target }}/
          sha256sum vcd_tools_rs-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > vcd_tools_rs-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
        shell: bash

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir vcd_tools_rs-${{ github.ref_name }}-${{ matrix.target }}
          copy target\${{ matrix.target }}\release\vcd_tools_rs.exe vcd_tools_rs-${{ github.ref_name }}-${{ matrix.target }}\
          copy target\${{ matrix.target }}\release\vcd2trace.exe vcd_tools_rs-${{ github.ref_name }}-${{ matrix.target }}\
          powershell Compress-Archive -Path vcd_tools_rs-${{ github.ref_name }}-${{ matrix.target }} -DestinationPath vcd_tools_rs-${{ github.ref_name }}-${{ matrix.target }}.zip
          certutil -hashfile vcd_tools_rs-${{ github.ref_name }}-${{ matrix.target }}.zip SHA256 | findstr /V ":" | findstr /V "Hashing" > vcd_tools_rs-${{ github.ref_name }}-${{ matrix.target }}.zip.sha256
        shell: powershell

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            vcd_tools_rs-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts -type f -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
